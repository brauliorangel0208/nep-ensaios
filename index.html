function calcDeltaR(vals) {
  const nums = vals.map(v => parseFloat(v||"0")).filter(n => n > 0);
  if (nums.length < 2) return "";
  const mx = Math.max(...nums), mn = Math.min(...nums);
  return ((mx/mn - 1)*100).toFixed(3);
}

function calcRmin(vnom) {
  const v = parseFloat(vnom||"0");
  if (!v) return "";
  return (v * 1 + 1).toFixed(1);
}

      // Monta o bloco de conte脙潞do correto: PDF usa type "document", imagem usa type "image"
      const blocoArquivo = isPdf
        ? { type: "document", source: { type: "base64", media_type: "application/pdf", data: b64 } }
        : { type: "image",    source: { type: "base64", media_type: mediaType, data: b64 } };
      const prompt = `Este 脙漏 um arquivo de ART (Anota脙搂脙拢o de Responsabilidade T脙漏cnica) brasileira${isPdf?" em PDF":""}. Extraia os dados e retorne APENAS JSON v脙隆lido sem markdown:
{"numeroArt":"","responsavel":"","crea":"","local":"","solicitante":""}
Regras:
- numeroArt: n脙潞mero da ART (ex: MA20251006343 ou os d脙颅gitos do n脙潞mero)
- responsavel: nome completo do engenheiro/respons脙隆vel t脙漏cnico

- local: endere脙搂o/localiza脙搂脙拢o da obra ou servi脙搂o
- solicitante: nome do propriet脙隆rio, cliente ou contratante
Retorne SOMENTE o JSON, nada mais.`;
      const resp = await fetch("/api/claude", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 800,
          messages: [{ role: "user", content: [blocoArquivo, { type: "text", text: prompt }] }]
        })
      });
      const data = await resp.json();
      const txt = data.content?.[0]?.text || "{}";
      let campos = {};
      try { campos = JSON.parse(txt.replace(/```json|```/g, "").trim()); } catch(e) {}
      const algumCampo = campos.numeroArt || campos.responsavel || campos.crea || campos.local || campos.solicitante;

      }

  }

function LogoNEP({height=52, style={}}) {
  const canvasRef = useRef(null);
  const [dataUrl, setDataUrl] = useState(null);

  useEffect(() => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      canvas.width = img.width;
      canvas.height = img.height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0);
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;
      // Torna pixels escuros (fundo preto) transparentes
      for (let i = 0; i < data.length; i += 4) {
        const r = data[i], g = data[i+1], b = data[i+2];
        const brightness = (r + g + b) / 3;
        if (brightness < 40) {
          // Pixel muito escuro = fundo 芒聠聮 transparente
          data[i+3] = 0;
        } else if (brightness < 80) {
          // Borda suave 芒聠聮 semi-transparente
          data[i+3] = Math.round((brightness / 80) * 255);
        }
      }
      ctx.putImageData(imageData, 0, 0);
      setDataUrl(canvas.toDataURL("image/png"));
    };
    img.src = `data:image/jpeg;base64,${LOGO_B64}`;
  }, []);

  if (!dataUrl) return (
    <div style={{height, display:"inline-block", ...style}}/>
  );
  return (
    <img src={dataUrl} alt="NEP Engenharia" style={{height, display:"block", ...style}}/>
  );
}

function PdfViewer({b64url, nome}) {
  const [paginas, setPaginas] = useState([]);
  const [carregando, setCarregando] = useState(true);
  const [erro, setErro] = useState(false);

  useEffect(() => {
    if (!b64url) return;
    setCarregando(true);
    setErro(false);
    setPaginas([]);

    async function renderPdf() {
      try {
        // Carrega pdf.js via CDN
        if (!window.pdfjsLib) {
          await new Promise((resolve, reject) => {
            const script = document.createElement("script");
            script.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
            script.onload = resolve;
            script.onerror = reject;
            document.head.appendChild(script);
          });
          window.pdfjsLib.GlobalWorkerOptions.workerSrc =
            "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
        }

        // Converte base64 para Uint8Array
        const base64 = b64url.split(",")[1];
        const raw = atob(base64);
        const arr = new Uint8Array(raw.length);
        for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);

        const pdf = await window.pdfjsLib.getDocument({data: arr}).promise;
        const imgs = [];

        for (let p = 1; p <= pdf.numPages; p++) {
          const page = await pdf.getPage(p);
          const viewport = page.getViewport({scale: 1.8});
          const canvas = document.createElement("canvas");
          canvas.width = viewport.width;
          canvas.height = viewport.height;
          const ctx = canvas.getContext("2d");
          await page.render({canvasContext: ctx, viewport}).promise;
          imgs.push(canvas.toDataURL("image/jpeg", 0.92));
        }

        setPaginas(imgs);
      } catch(e) {
        console.error("PdfViewer erro:", e);
        setErro(true);
      } finally {
        setCarregando(false);
      }
    }

    renderPdf();
  }, [b64url]);

  if (carregando) return (
    <div style={{background:"#F9FAFB",border:"1px solid #E5E7EB",borderRadius:8,padding:32,textAlign:"center",color:"#6B7280",fontSize:13}}>
      芒聫鲁 Renderizando PDF...
    </div>
  );

  if (erro) return (
    <div style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:8,padding:16,textAlign:"center",color:"#DC2626",fontSize:12}}>
      芒職聽茂赂聫 N脙拢o foi poss脙颅vel renderizar o PDF "{nome}". Verifique se o arquivo 脙漏 v脙隆lido.
    </div>
  );

  return (
    <div style={{border:"1px solid #E5E7EB",borderRadius:8,overflow:"hidden"}}>
      {paginas.map((src, i) => (
        <img key={i} src={src} alt={`P脙隆gina ${i+1}`}
          style={{width:"100%",display:"block",borderBottom: i < paginas.length-1 ? "2px solid #E5E7EB" : "none"}}/>
      ))}
    </div>
  );
}
